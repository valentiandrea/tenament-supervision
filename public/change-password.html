<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Password — Tenement Supervision</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117; --surface: #161b22; --border: #30363d;
      --text-1: #e6edf3; --text-2: #8b949e;
      --blue: #2f81f7; --blue-h: #388bfd; --red: #f85149; --green: #3fb950;
    }
    body { background: var(--bg); color: var(--text-1); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .wrap { width: 100%; max-width: 380px; padding: 24px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 28px; }
    h2 { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
    .sub { font-size: 13px; color: var(--text-2); margin-bottom: 22px; line-height: 1.5; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 12.5px; font-weight: 600; color: var(--text-2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .04em; }
    input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font-size: 14px; color: var(--text-1); outline: none; transition: border-color .15s; }
    input:focus { border-color: var(--blue); }
    .btn { width: 100%; padding: 11px; border-radius: 8px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; background: var(--blue); color: #fff; margin-top: 4px; }
    .btn:hover { background: var(--blue-h); }
    .btn:disabled { opacity: .55; cursor: not-allowed; }
    .msg { display: none; border-radius: 7px; padding: 10px 13px; font-size: 13px; margin-bottom: 16px; line-height: 1.5; }
    .msg.error  { display: block; background: rgba(248,81,73,.1); border: 1px solid rgba(248,81,73,.3); color: var(--red); }
    .msg.success { display: block; background: rgba(63,185,80,.1); border: 1px solid rgba(63,185,80,.3); color: var(--green); }
    .rules { font-size: 12px; color: var(--text-2); margin-top: -8px; margin-bottom: 14px; line-height: 1.7; }
    .rules li { margin-left: 16px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h2>Change Password</h2>
      <p class="sub">You must set a new password before continuing.</p>
      <div class="msg" id="msg"></div>
      <form id="form">
        <div class="form-group">
          <label>Current Password</label>
          <input type="password" id="current" autocomplete="current-password" required>
        </div>
        <div class="form-group">
          <label>New Password</label>
          <input type="password" id="newpw" autocomplete="new-password" required>
        </div>
        <ul class="rules">
          <li>At least 10 characters</li>
          <li>Uppercase &amp; lowercase letters</li>
          <li>At least one digit</li>
          <li>At least one special character</li>
        </ul>
        <div class="form-group">
          <label>Confirm New Password</label>
          <input type="password" id="confirm" autocomplete="new-password" required>
        </div>
        <button class="btn" type="submit" id="btn">Update Password</button>
      </form>
    </div>
  </div>

  <script src="/js/change-password.js"></script>
</body>
</html>
