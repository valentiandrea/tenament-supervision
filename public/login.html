<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Tenement Supervision</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0d1117;
      --surface: #161b22;
      --border:  #30363d;
      --text-1:  #e6edf3;
      --text-2:  #8b949e;
      --blue:    #2f81f7;
      --blue-h:  #388bfd;
      --red:     #f85149;
      --green:   #3fb950;
    }
    body {
      background: var(--bg);
      color: var(--text-1);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-wrap {
      width: 100%;
      max-width: 360px;
      padding: 24px;
    }
    .logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 64px;
      height: 64px;
      margin-bottom: 12px;
    }
    .logo h1 {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-1);
      letter-spacing: -.3px;
    }
    .logo p {
      font-size: 13px;
      color: var(--text-2);
      margin-top: 3px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px 28px 24px;
    }
    .card h2 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 20px;
      color: var(--text-1);
    }
    .form-group { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 12.5px;
      font-weight: 600;
      color: var(--text-2);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      color: var(--text-1);
      outline: none;
      transition: border-color .15s;
    }
    input:focus { border-color: var(--blue); }
    input::placeholder { color: var(--text-2); opacity: .6; }
    .btn {
      width: 100%;
      padding: 11px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, opacity .15s;
      margin-top: 4px;
    }
    .btn-primary { background: var(--blue); color: #fff; }
    .btn-primary:hover { background: var(--blue-h); }
    .btn-primary:disabled { opacity: .55; cursor: not-allowed; }
    .error-box {
      display: none;
      background: rgba(248,81,73,.1);
      border: 1px solid rgba(248,81,73,.3);
      border-radius: 7px;
      padding: 10px 13px;
      font-size: 13px;
      color: var(--red);
      margin-bottom: 16px;
      line-height: 1.5;
    }
    .error-box.show { display: block; }
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hint {
      font-size: 11.5px;
      color: var(--text-2);
      text-align: center;
      margin-top: 18px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="logo">
      <div class="logo-icon">
        <img src="/edelogo.svg" alt="EDE Logo" style="width:64px;height:64px;">
      </div>
      <h1>Tenement Supervision</h1>
      <p>Sign in to continue</p>
    </div>

    <div class="card">
      <h2>Sign In</h2>
      <div class="error-box" id="error-box"></div>

      <form id="login-form" autocomplete="on">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" autocomplete="username"
                 placeholder="your username" required autofocus>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="current-password"
                 placeholder="••••••••••" required>
        </div>
        <button class="btn btn-primary" type="submit" id="submit-btn">Sign In</button>
      </form>
    </div>

    <p class="hint">Access is restricted to authorised users only.</p>
  </div>

  <script src="/js/login.js"></script>
</body>
</html>
